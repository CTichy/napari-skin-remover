name: napari-skin-remover
display_name: MONAI Skin-Remover
contributions:
  commands:
    - id: napari-skin-remover.skin_remover_widget
      python_name: napari_skin_remover._widget:SkinRemoverWidget
      title: MONAI Skin-Remover
    - id: napari-skin-remover.get_reader
      python_name: napari_skin_remover._reader:get_reader
      title: Open confocal stack (TIF / IMS)
  widgets:
    - command: napari-skin-remover.skin_remover_widget
      display_name: MONAI Skin-Remover
  readers:
    - command: napari-skin-remover.get_reader
      filename_patterns:
        - "*.tif"
        - "*.tiff"
        - "*.ims"
      accepts_directories: false
